name: Sync wiki

on:
  push:
    branches:
      - master
    paths:
      - 'wiki/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Checkout wiki repository
        run: git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo

      - name: Sync wiki pages
        run: |
          rsync -a --delete --exclude='.git' repo/wiki/ wiki-repo/

      - name: Commit and push
        working-directory: wiki-repo
        run: |
          git config user.name "totpero"
          git config user.email "www.totpe.ro@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to publish."
            exit 0
          fi
          git commit -m "Sync wiki pages from ${{ github.repository }}@${{ github.sha }}"
          git push
